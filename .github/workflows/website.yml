name: Deploy DNS Hop website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dns-hop-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      base_path: ${{ steps.base.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Resolve base path
        id: base
        shell: bash
        run: |
          owner_site="${{ github.repository_owner }}.github.io"
          repo_name="${{ github.event.repository.name }}"

          if [ "$repo_name" = "$owner_site" ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.value }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
